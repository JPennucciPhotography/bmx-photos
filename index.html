<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Find Your Photos</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,Helvetica,sans-serif;background:#fff;color:#222;padding:28px 16px;max-width:560px}
  h1{font-size:22px;margin-bottom:6px}
  .sub{font-size:14px;color:#888;margin-bottom:16px}
  .race-list{display:flex;flex-direction:column;gap:10px}
  .race-card{display:block;padding:14px 18px;background:#f5f5f5;border-radius:8px;text-decoration:none;color:#222}
  .race-card:hover{background:#e8e8e8}
  .race-name{font-size:16px;font-weight:bold}
  .race-date{font-size:13px;color:#888;margin-top:3px}
</style>
</head>
<body>
<h1>📷 Find Your Photos</h1>
<p class="sub">Select a race event to find your photos.</p>
<div class="race-list">
  <a class="race-card" href="https://jpennucciphotography.github.io/bmx-photos/local-race-6-16-2026.html">
    <div class="race-name">Local Race</div>
    <div class="race-date">June 16, 2026</div>
  </a>
  <a class="race-card" href="https://jpennucciphotography.github.io/bmx-photos/local-race-6-13-2026.html">
    <div class="race-name">Local Race</div>
    <div class="race-date">June 13, 2026</div>
  </a>
</div>
</body>
</html>
